<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knight Dispatch</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Knight<br>Dispatch</h2>

        <ul>
            <li class="active"><i class="fa-solid fa-route"></i> Route Planner</li>
            <li><i class="fa-solid fa-chart-line"></i> Path Analytics</li>
            <li><i class="fa-solid fa-play"></i> Step Simulator</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>Knight Delivery Route Planner</h1>

        <div class="container">

            <!-- Config -->
            <div class="card">
                <h3>Configuration</h3>

                <label>Grid Size</label>
                <input type="number" id="size" value="8">

                <label>Start Row</label>
                <input type="number" id="startRow" value="0">

                <label>Start Column</label>
                <input type="number" id="startCol" value="0">

                <button onclick="generateTour()">Generate Route</button>

                <h3 class="sim-title">Simulation</h3>
                <button onclick="play()">▶ Play</button>
                <button onclick="pause()">⏸ Pause</button>
                <button onclick="restart()">🔄 Restart</button>
                <p id="message" style="margin-top:10px;color:#ff6b6b;"></p>
            </div>

            <!-- Board -->
            <div id="board"></div>

            <!-- Right Panel -->
            <div class="card right">
                <h3>Movement Order</h3>
                <div id="moves"></div>
            </div>
            <div class="analytics" th:if="${board != null}">

            <h3> Analytics</h3>

            <div class="analytics-grid">

                <div class="box">
                    <span>Moves</span>
                    <strong th:text="${n*n}"></strong>
                </div>

                <div class="box">
                    <span>Grid</span>
                    <strong th:text="${n + ' x ' + n}"></strong>
                </div>
                <div class="box">
                    <span>Start</span>
                    <strong th:text="${startPos}"></strong>
                </div>

                <div class="box">
                    <span>End</span>
                    <strong th:text="${endPos}"></strong>
                </div>

            </div>

        </div>

    </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
